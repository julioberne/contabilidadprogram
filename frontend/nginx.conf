# FIN-SYS OS — Nginx config para frontend (endurecido)
# Sirve archivos estáticos + proxy reverso al backend

# WebSocket upgrade map (estándar, no hardcodear Connection: upgrade)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Frontend estático (Vite build)
    root /usr/share/nginx/html;
    index index.html;

    # Archivos estáticos con cache agresivo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy reverso: /api/* → backend FastAPI
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (solo cuando hay Upgrade header)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Uploads (archivos subidos)
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # 🔒 /docs y /openapi.json NO se exponen en producción
    # El healthcheck interno usa /api/health (accesible vía /api/)

    # SPA fallback: cualquier ruta → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Ocultar versión de Nginx
    server_tokens off;
}
