# ==============================================================
# FIN-SYS OS v2.0 — Docker Compose (Producción)
# 2 servicios independientes: frontend (Nginx) + backend (FastAPI)
# ==============================================================

services:
  # ─────────────────────────────────────────────────────────────
  # BACKEND: FastAPI + Gunicorn
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finsys-backend
    restart: unless-stopped
    # Variables inyectadas por Dokploy (Environment tab) vía interpolación ${VAR}
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - CORS_ORIGINS=${CORS_ORIGINS}
    expose:
      - "8000"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - finsys-net

  # ─────────────────────────────────────────────────────────────
  # FRONTEND: Vite build + Nginx (proxy reverso)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finsys-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - finsys-net

volumes:
  uploads:

networks:
  finsys-net:
    driver: bridge
